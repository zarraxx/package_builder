name: Build Rootfs

on:
  workflow_dispatch: # 开启手动触发
    inputs:
      package:
        description: '构建包类型'
        required: true
        type: choice
        options:
          - rootfs

      version:
        description: '构建版本'
        required: true
        type: choice
        options:                      
          - 15.2.0
      
      deploy-body:
        description: '发布说明'     # 文本框上方的描述
        required: true                # 是否必填
        default: '常规版本发布'              # 默认值
        type: string                  # 类型：字符串

permissions:
  contents: write

jobs:

  fetch-and-package:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v5
      - name: Fetch 
        run: |
          mkdir -p ~/archive
          ls -lah ~/archive
          ./build.sh ${{ inputs.package }} ${{ inputs.version }} source
      - name: Package 
        run: |
          mkdir -p ~/archive
          ls -lah ~/archive
          ./build.sh ${{ inputs.package }} ${{ inputs.version }} build
      - name: Upload archives
        uses: actions/upload-artifact@v4
        with:
          name: sysroot-archives
          path: ./dist/archives/*.tar.xz


  publish-release:
   needs:
     - fetch-and-package
   permissions:
      contents: write
   uses: ./.github/workflows/reusable-release.yml
   with:
      package: "${{ inputs.package }}"
      version: "${{ inputs.version }}"
      deploy-body: "${{ inputs.deploy-body }}"
