name: Build Compiler

on:
  workflow_dispatch: # 开启手动触发
    inputs:
      package:
        description: '构建包类型'
        required: true
        type: choice
        options:
          - compiler

      version:
        description: '构建版本'
        required: true
        type: choice
        options:                      
          - gcc-11.5.0
          - gcc-15.2.0
      deploy-body:
        description: '发布说明'     # 文本框上方的描述
        required: true                # 是否必填
        default: '常规版本发布'              # 默认值
        type: string                  # 类型：字符串

permissions:
  contents: write

jobs:
  prepare-source:
   runs-on: ubuntu-latest
   outputs:
      version: ${{ steps.get_version.outputs.version }}
   steps:
    - uses: actions/checkout@v5
    - name: Load version into env
      id: get_version
      run: |
        VERSION="${{ inputs.version }}"
        PACKAGE="${{ inputs.package }}"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "PACKAGE=$PACKAGE" >> "$GITHUB_ENV"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "package=$PACKAGE" >> "$GITHUB_OUTPUT"
    - name: Cache source tarball
      uses: actions/cache@v5
      with:
            path: ~/archive
            key: source-public
    - name: Download source tarball
      run: |
        mkdir -p ~/archive
        ./build.sh ${{ inputs.package }} ${{ inputs.version }} source ~/archive
  build-and-package:
    needs:
     - prepare-source
    uses: ./.github/workflows/reusable-build-linux.yml
    with:
      package: "${{ inputs.package }}"
      version: ${{ inputs.version }}
      build_script: "./build.sh"

  publish-release:
   needs:
     - prepare-source
     - build-and-package
   permissions:
      contents: write
   uses: ./.github/workflows/reusable-release.yml
   with:
      package: "${{ inputs.package }}"
      version: "${{ inputs.version }}"
      deploy-body: "${{ inputs.deploy-body }}"