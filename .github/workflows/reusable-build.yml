# .github/workflows/reusable-build.yml
name: Reusable Matrix Build

on:
  workflow_call:
    inputs:
      package:
        required: true
        type: string
      version:
        required: true
        type: string
      build_script:
        required: false
        type: string
        default: "./build.sh"

jobs:
  build-all:
    strategy:
      fail-fast: false
      matrix:
        # 定义基础维度
        os_type: [linux, windows, macos]
        arch: [x86_64, aarch64]
        # 排除不支持的组合
        exclude:
          - os_type: windows
            arch: aarch64
        # 针对每个组合定义具体的运行环境
        include:
          - os_type: linux
            arch: x86_64
            runs_on: ubuntu-latest
            shell: bash
          - os_type: linux
            arch: aarch64
            runs_on: ubuntu-24.04-arm
            shell: bash
          - os_type: windows
            arch: x86_64
            runs_on: windows-latest
            shell: msys2 {0}
          - os_type: macos
            arch: x86_64
            runs_on: macos-15-intel
            shell: bash
          - os_type: macos
            arch: aarch64
            runs_on: macos-latest
            shell: bash

    runs-on: ${{ matrix.runs_on }}
    defaults:
      run:
        shell: ${{ matrix.shell }}

    steps:
      - uses: actions/checkout@v5

      # 1. Windows 初始化
      - name: Setup MSYS2
        if: matrix.os_type == 'windows'
        uses: msys2/setup-msys2@v2
        with:
          update: true
          install: base-devel gcc make

      # 2. macOS 初始化
      - name: Setup Brew
        if: matrix.os_type == 'macos'
        run: brew install coreutils

      # 3. 运行构建
      - name: Run Build
        run: |
          # 确保脚本有执行权限
          chmod +x ${{ inputs.build_script }}
          # 执行
          ${{ inputs.build_script }} ${{ inputs.package }} ${{ inputs.version }} ${{ matrix.arch }}